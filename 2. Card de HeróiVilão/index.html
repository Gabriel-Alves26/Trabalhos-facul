<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Card Monokuma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>Monokuma</h1>
        <p class="tipo">Tipo: Vilão</p>

        <img src="Monokuma.png" alt="Monokuma">

        <div class="status">
            <p>Vida</p>
            <div class="barra">
                <div class="progresso vida"></div>
            </div>

            <p>Poder</p>
            <div class="barra">
                <div class="progresso poder"></div>
            </div>

            <p>Inteligência</p>
            <div class="barra">
                <div class="progresso inteligencia"></div>
            </div>
        </div>
    </div>

</body>
</html>
