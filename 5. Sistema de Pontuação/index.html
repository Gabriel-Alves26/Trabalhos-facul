<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de XP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="painel">
        <h1>Sistema de Pontuação</h1>

        <h2>XP Atual: <span id="xp">0</span></h2>

        <div class="botoes">
            <button onclick="ganharXP()">+10 XP</button>
            <button onclick="perderXP()">-5 XP</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
